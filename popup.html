<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>YouTube Sub Manager</title>
    <style>
      body {
        width: 350px;
        padding: 20px;
        font-family: 'Segoe UI', sans-serif;
        background-color: #0f0f0f;
        color: #ffffff;
      }

      h1 {
        font-size: 18px;
        color: #ff0000;
        margin-bottom: 16px;
      }

      button {
        width: 100%;
        padding: 10px;
        background-color: #ff0000;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
      }

      button:hover {
        background-color: #cc0000;
      }

      #status {
        margin-top: 12px;
        font-size: 13px;
        color: #aaaaaa;
      }
    </style>
  </head>
  <body>
    <h1>YouTube Sub Manager</h1>
    <button id="loginBtn">Google 계정으로 로그인</button>
    <p id="status">로그인이 필요합니다.</p>

    <script src="popup.js"></script>
  </body>
</html>
